services:
  anki-headless:
    image: pnorcross/anki-desktop:latest
    container_name: anki-headless
    restart: unless-stopped
    environment:
      - TZ=UTC
    volumes:
      - anki_profile:/config/app
    ports:
      - "127.0.0.1:3000:3000"
      - "127.0.0.1:8765:8765"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8765 >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 30s

volumes:
  anki_profile:
